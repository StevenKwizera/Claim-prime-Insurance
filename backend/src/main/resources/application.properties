spring.application.name=cyuzuzo-backend
server.port=${PORT:4000}

spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:cyuzuzo_db}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:ksteven}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# JWT signing (use JWT_SECRET env in production — must be at least 256 bits for HS256)
jwt.secret=${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Evidence files (on-disk storage under this directory)
app.claims.upload-dir=${CLAIMS_UPLOAD_DIR:./data/claim-uploads}
app.claims.max-file-bytes=${CLAIMS_MAX_FILE_BYTES:15728640}
app.frontend.reset-url=${FRONTEND_RESET_URL:http://localhost:5173/forgot-password}
# When true, only admin accounts require email OTP at login (see OtpService.staffRequiresLoginOtp).
app.auth.staff-login-otp-enabled=${STAFF_LOGIN_OTP:true}
app.auth.allow-login-without-otp-when-mail-fails=${ALLOW_LOGIN_WITHOUT_OTP_IF_MAIL_FAILS:false}
app.auth.expose-otp-in-response=${EXPOSE_OTP_IN_RESPONSE:true}

spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=60MB

# Email. For Gmail, create an App Password and set MAIL_PASSWORD in your environment.
mail.enabled=${MAIL_ENABLED:true}
mail.from=${MAIL_FROM:Prime Insurance <primeinsurance@gmail.com>}
mail.recipients=${MAIL_RECIPIENTS:}
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
